name: Job Scraper Cron

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This explicitly grants the runner push access

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main # CRITICAL: Forces runner to attach to the main branch, not a detached HEAD
          fetch-depth: 0 # CRITICAL: Pulls the full commit history to prevent push conflicts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          playwright install chromium
          playwright install-deps

      - name: Run Scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and push state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update job state"
          file_pattern: "seen_jobs.json"
